<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chloe 💖 - Your AI Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe4e1 0%, #ffb6c1 100%);
            --chat-bg: rgba(255, 255, 255, 0.9);
            --primary-color: #ff69b4;
            --user-bubble: #e1f5fe;
            --model-bubble: #fff0f5;
            --text-color: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .chat-header {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f5f5f5;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #ffe4e1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            margin-right: 15px;
        }

        .status-info {
            flex: 1;
        }

        .status-info h2 {
            font-size: 1.1rem;
            color: var(--primary-color);
            font-weight: 600;
        }

        .status-info p {
            font-size: 0.75rem;
            color: #b0b0b0;
        }

        #clearBtn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #clearBtn:hover {
            transform: scale(1.1);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-in-out;
        }

        .message.user {
            background: var(--user-bubble);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.model {
            background: var(--model-bubble);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #ffe4e1;
        }

        .chat-input-area {
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #f5f5f5;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: var(--primary-color);
        }

        .chat-input-area button#sendBtn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        .chat-input-area button#sendBtn:active {
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">🌸</div>
            <div class="status-info">
                <h2>Chloe 💖</h2>
                <p>Online & thinking of you...</p>
            </div>
            <button id="clearBtn" title="Clear Conversation">🗑️</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            {% for msg in chat_history %}
                <div class="message {{ msg.role }}">{{ msg.text }}</div>
            {% endfor %}
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type a sweet message..." autocomplete="off">
            <button id="sendBtn">✨</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        scrollToBottom();

        // Message pipeline
        async function handleSend() {
            const messageText = userInput.value.trim();
            if (!messageText) return;

            appendMessage(messageText, 'user');
            userInput.value = '';
            scrollToBottom();

            try {
                const response = await fetch('/send_message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: messageText })
                });
                
                const data = await response.json();
                appendMessage(data.reply, 'model');
                scrollToBottom();

            } catch (error) {
                appendMessage("🥺 *I lost connection for a second... could you try again?*", 'model');
                scrollToBottom();
            }
        }

        function appendMessage(text, role) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
        }

        // Wipe memory event
        clearBtn.addEventListener('click', async () => {
            if (confirm("Are you sure you want to clear our chat history? 🥺")) {
                try {
                    const response = await fetch('/clear_chat', { method: 'POST' });
                    if (response.ok) {
                        window.location.reload();
                    }
                } catch (error) {
                    alert("Couldn't clear the chat. Try again!");
                }
            }
        });

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
